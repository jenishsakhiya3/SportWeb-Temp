name: Trigger auto deployment for sportweb-containerapp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sportweb-containerapp-AutoDeployTrigger-d9e00faa-bcce-4944-a8ac-549d970bafb2.yml'

  # Allow manual trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.SPORTWEBCONTAINERAPP_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: sportregistry.azurecr.io
          registryUsername: ${{ secrets.SPORTWEBCONTAINERAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SPORTWEBCONTAINERAPP_REGISTRY_PASSWORD }}
          containerAppName: sportweb-containerapp
          resourceGroup: SportEastAsia
          imageToBuild: sportregistry.azurecr.io/sportweb-containerapp:${{ github.sha }}
          
            

     

