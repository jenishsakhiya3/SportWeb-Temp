name: Trigger auto deployment for sportweb-container

on:
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/sportweb-container-AutoDeployTrigger-587c3212-6efd-4c99-9de1-4e1528d74028.yml'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    # Running on an older Ubuntu version to prevent Azure build failures
    runs-on: ubuntu-22.04
    permissions: 
      id-token: write 
      contents: read 

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SPORTWEBCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SPORTWEBCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SPORTWEBCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          
          # IMPORTANT: Replace YOUR_REGISTRY_NAME with your actual ACR name
          registryUrl: YOUR_REGISTRY_NAME.azurecr.io
          
          registryUsername: ${{ secrets.SPORTWEBCONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SPORTWEBCONTAINER_REGISTRY_PASSWORD }}
          containerAppName: sportweb-container
          resourceGroup: SportEastAsia
          
          # IMPORTANT: Make sure this URL matches the registryUrl above
          imageToBuild: YOUR_REGISTRY_NAME.azurecr.io/sportweb-container:${{ github.sha }}